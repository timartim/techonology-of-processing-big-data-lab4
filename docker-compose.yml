services:
  redis:
    image: redis:7-alpine
    container_name: catdog-redis
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    secrets:
      - redis_username
      - redis_password
      - redis_users_acl
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "redis-cli --user \"$$(cat /run/secrets/redis_username)\" --pass \"$$(cat /run/secrets/redis_password)\" ping | grep PONG"
        ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  vault:
    image: hashicorp/vault:1.21
    container_name: catdog-vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    command: ["vault", "server", "-config=/vault/config/vault.hcl"]
    ports:
      - "8200:8200"
    volumes:
      - vault_file:/vault/file
      - ./vault/vault.hcl:/vault/config/vault.hcl:ro
    environment:
      VAULT_ADDR: http://127.0.0.1:8200

  kafka:
    image: apache/kafka:4.2.0
    container_name: catdog-kafka
    restart: unless-stopped
    hostname: kafka
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_NUM_PARTITIONS: 1
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 40s

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${IMAGE:-akp1n/catdog-api:latest}
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8001}:8000"
    command: ["./entrypoint.sh"]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID_FILE: /vault-bootstrap/role_id
      VAULT_SECRET_ID_FILE: /vault-bootstrap/secret_id
      VAULT_KV_MOUNT: app
      VAULT_REDIS_SECRET_PATH: catdog/redis
      VAULT_KAFKA_SECRET_PATH: catdog/kafka
      MODEL_VERSION: ${MODEL_VERSION:-1.0.0}
      MODEL_DEVICE: ${MODEL_DEVICE:-cpu}
      CLASSIFIER_KEY: ${CLASSIFIER_KEY:-LOG_REG}
    volumes:
      - ./.vault-local:/vault-bootstrap:ro
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

  consumer:
    image: ${IMAGE:-akp1n/catdog-api:latest}
    restart: unless-stopped
    command: ["python", "-m", "src.kafka.consumer_app"]
    environment:
      VAULT_ADDR: http://vault:8200
      VAULT_ROLE_ID_FILE: /vault-bootstrap/role_id
      VAULT_SECRET_ID_FILE: /vault-bootstrap/secret_id
      VAULT_KV_MOUNT: app
      VAULT_REDIS_SECRET_PATH: catdog/redis
      VAULT_KAFKA_SECRET_PATH: catdog/kafka
    volumes:
      - ./.vault-local:/vault-bootstrap:ro
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy

volumes:
  redis_data:
  vault_file:
  kafka_data:

secrets:
  redis_host:
    file: ./secrets/redis_host.txt
  redis_port:
    file: ./secrets/redis_port.txt
  redis_db:
    file: ./secrets/redis_db.txt
  redis_username:
    file: ./secrets/redis_username.txt
  redis_password:
    file: ./secrets/redis_password.txt
  redis_users_acl:
    file: ./secrets/redis_users.acl