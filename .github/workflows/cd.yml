name: CD Dog or Cat Test

on:
  workflow_run:
    workflows: ["CI (docker compose)"]
    types:
      - completed

env:
  IMAGE: akp1n/catdog-api:latest
  APP_PORT: "8001"

jobs:
  smoke:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Create runtime secret files
        shell: bash
        run: |
          set +x
          mkdir -p secrets .vault-local

          printf "%s" "${{ secrets.REDIS_HOST_INTERNAL }}" > secrets/redis_host.txt
          printf "%s" "${{ secrets.REDIS_PORT_INTERNAL }}" > secrets/redis_port.txt
          printf "%s" "${{ secrets.REDIS_DB_INDEX }}" > secrets/redis_db.txt
          printf "%s" "${{ secrets.REDIS_APP_USERNAME }}" > secrets/redis_username.txt
          printf "%s" "${{ secrets.REDIS_APP_PASSWORD }}" > secrets/redis_password.txt
          printf "%s" "${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}" > secrets/kafka_bootstrap_servers.txt
          printf "%s" "${{ secrets.KAFKA_TOPIC_PREDICTIONS }}" > secrets/kafka_topic_predictions.txt
          printf "%s" "${{ secrets.KAFKA_CONSUMER_GROUP }}" > secrets/kafka_consumer_group.txt
          printf "%s" "${{ secrets.KAFKA_NODE_ID }}" > secrets/kafka_node_id.txt
          printf "%s" "${{ secrets.KAFKA_PORT }}" > secrets/kafka_port.txt
          
          echo "::add-mask::${{ secrets.REDIS_APP_PASSWORD }}"
          echo "::add-mask::${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}"
          echo "::add-mask::${{ secrets.KAFKA_TOPIC_PREDICTIONS }}"
          echo "::add-mask::${{ secrets.KAFKA_CONSUMER_GROUP }}"
          echo "::add-mask::${{ secrets.KAFKA_PORT }}"
          
          cat > secrets/redis_users.acl <<EOF
          user default off
          user ${{ secrets.REDIS_APP_USERNAME }} on >${{ secrets.REDIS_APP_PASSWORD }} ~prediction:* ~predictions:* ~prediction-consumed:* ~predictions:consumed:* +ping +hset +hgetall +zadd +zrevrange +multi +exec +select +client
          EOF

          chmod 644 secrets/*

      - name: Make bootstrap script executable
        run: chmod +x scripts/bootstrap_vault.sh

      - name: Pull image
        run: docker pull $IMAGE

      - name: Start vault, redis and kafka
        run: |
          IMAGE=$IMAGE APP_PORT=$APP_PORT docker compose up -d --no-build vault redis kafka

      - name: Wait for kafka
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T kafka sh -lc '/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1'; then
              echo "Kafka is up"
              exit 0
            fi
            sleep 2
          done
          echo "Kafka did not start"
          docker compose logs --no-color kafka || true
          exit 1

      - name: Bootstrap Vault
        env:
          REDIS_HOST: ${{ secrets.REDIS_HOST_INTERNAL }}
          REDIS_PORT: ${{ secrets.REDIS_PORT_INTERNAL }}
          REDIS_DB: ${{ secrets.REDIS_DB_INDEX }}
          REDIS_USERNAME: ${{ secrets.REDIS_APP_USERNAME }}
          REDIS_PASSWORD: ${{ secrets.REDIS_APP_PASSWORD }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BOOTSTRAP_SERVERS }}
          KAFKA_TOPIC_PREDICTIONS: ${{ secrets.KAFKA_NODE_ID }}
          KAFKA_CONSUMER_GROUP: ${{ secrets.KAFKA_CONSUMER_GROUP }}
        run: |
          ./scripts/bootstrap_vault.sh
          ROLE_ID="$(cat .vault-local/role_id)"
          SECRET_ID="$(cat .vault-local/secret_id)"
          echo "::add-mask::$ROLE_ID"
          echo "::add-mask::$SECRET_ID"

      - name: Create kafka topic
        run: |
          docker compose exec -T kafka sh -lc '
            KAFKA_PORT="$(cat /run/secrets/kafka_port)"
            KAFKA_TOPIC_PREDICTIONS="$(cat /run/secrets/kafka_topic_predictions)"
      
            /opt/kafka/bin/kafka-topics.sh \
              --bootstrap-server "localhost:${KAFKA_PORT}" \
              --create \
              --if-not-exists \
              --topic "${KAFKA_TOPIC_PREDICTIONS}" \
              --partitions 1 \
              --replication-factor 1
          '

      - name: Start web and consumer
        run: |
          IMAGE=$IMAGE APP_PORT=$APP_PORT docker compose up -d --no-build web consumer

      - name: Wait for API
        run: |
          for i in {1..30}; do
            if curl -fsS "http://localhost:${APP_PORT}/docs" >/dev/null; then
              echo "API is up"
              exit 0
            fi
            sleep 2
          done
          echo "API did not start"
          docker compose logs --no-color vault || true
          docker compose logs --no-color redis || true
          docker compose logs --no-color kafka || true
          docker compose logs --no-color web || true
          docker compose logs --no-color consumer || true
          exit 1

      - name: Functional test (POST /predict twice)
        run: |
          CAT_FILE="tests/images/cat.411.jpg"
          DOG_FILE="tests/images/dog.120.jpg"

          echo "=== CAT ==="
          CAT_STATUS=$(curl -s -o cat_resp.json -w "%{http_code}" \
            -F "file=@${CAT_FILE}" \
            http://localhost:${APP_PORT}/predict)
          echo "HTTP status: $CAT_STATUS"
          cat cat_resp.json
          test "$CAT_STATUS" = "200"

          echo "=== DOG ==="
          DOG_STATUS=$(curl -s -o dog_resp.json -w "%{http_code}" \
            -F "file=@${DOG_FILE}" \
            http://localhost:${APP_PORT}/predict)
          echo "HTTP status: $DOG_STATUS"
          cat dog_resp.json
          test "$DOG_STATUS" = "200"

          python - << 'PY'
          import json

          def normalize_prediction(data):
              if "prediction" in data:
                  return data["prediction"]
              return data

          def load_p(path):
              data = json.load(open(path, "r", encoding="utf-8"))
              pred = normalize_prediction(data)
              assert "dogProbability" in pred, pred
              p = pred["dogProbability"]
              assert isinstance(p, (int, float)), type(p)
              assert 0.0 <= p <= 1.0, p
              return float(p)

          cat_p = load_p("cat_resp.json")
          dog_p = load_p("dog_resp.json")

          print("cat dogProbability =", cat_p)
          print("dog dogProbability =", dog_p)
          assert cat_p < 0.5, f"Expected cat_p < 0.5, got {cat_p}"
          assert dog_p > 0.5, f"Expected dog_p > 0.5, got {dog_p}"
          print("predict OK")
          PY

      - name: Functional test (GET /predictions)
        run: |
          STATUS=$(curl -s -o preds.json -w "%{http_code}" \
            "http://localhost:${APP_PORT}/predictions?limit=10")
          echo "PREDICTIONS status: $STATUS"
          test "$STATUS" = "200"

          python - << 'PY'
          import json

          def normalize_prediction(data):
              if "prediction" in data:
                  return data["prediction"]
              return data

          with open("cat_resp.json", "r", encoding="utf-8") as f:
              cat_resp = normalize_prediction(json.load(f))

          with open("dog_resp.json", "r", encoding="utf-8") as f:
              dog_resp = normalize_prediction(json.load(f))

          with open("preds.json", "r", encoding="utf-8") as f:
              preds = json.load(f)

          assert isinstance(preds, list), preds
          assert len(preds) >= 2, preds

          required_ids = {
              cat_resp["predictionId"],
              dog_resp["predictionId"],
          }

          found_ids = {item["predictionId"] for item in preds}
          missing = required_ids - found_ids

          assert not missing, f"Missing predictionIds in /predictions: {missing}"

          for item in preds:
              assert "predictionId" in item, item
              assert "fileName" in item, item
              assert "createdAt" in item, item
              assert "dogProbability" in item, item
              assert "predictedLabel" in item, item
              assert "modelVersion" in item, item

          print("predictions API OK")
          PY

      - name: Logs on failure
        if: failure()
        run: |
          docker compose logs --no-color vault || true
          docker compose logs --no-color redis || true
          docker compose logs --no-color kafka || true
          docker compose logs --no-color web || true
          docker compose logs --no-color consumer || true

      - name: Cleanup
        if: always()
        run: |
          docker compose down -v --remove-orphans || true
          rm -rf secrets .vault-local